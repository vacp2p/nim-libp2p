name: Daily runnableExamples

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runnable-examples:
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    name: "Run runnableExamples check"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: linux
          cpu: amd64
          nim_ref: v2.2.10

      - name: Restore deps from cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: nimbledeps
          # os/cpu are part of the key because nimbledeps contains
          # platform-specific static archives (libminiupnpc.a, libnatpmp.a,
          # ...) vendored by nim-nat-traversal. See ci.yml for full context.
          key: nimbledeps-linux-amd64-${{ hashFiles('.pinned') }}

      - name: Install deps
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        run: |
          nimble install_pinned

      - name: Run runnableExamples check
        run: |
          nim c -r ./tools/check_code_examples.nim
