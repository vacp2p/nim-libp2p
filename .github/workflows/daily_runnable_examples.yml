name: Daily runnableExamples

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runnable-examples:
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-daily-ci')
    defaults:
      run:
        shell: bash

    name: "Run runnableExamples check"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: linux
          cpu: amd64
          nim_ref: v2.2.10

      - name: Install dependencies
        uses: "./.github/actions/install_root_deps"
        with:
          os: linux
          cpu: amd64
          cc: gcc

      - name: Run runnableExamples check
        run: |
          nim c -r ./tools/check_code_examples.nim
