name: Daily runnableExamples

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runnable-examples:
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-daily-ci')
    defaults:
      run:
        shell: bash

    name: "Run runnableExamples check"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: linux
          cpu: amd64
          nim_ref: v2.2.10

      - name: Restore deps from cache
        id: deps-cache
        uses: actions/cache/restore@v5
        with:
          path: nimbledeps
          # Keep this in sync with ci.yml's cache key so entries are
          # reusable. See ci.yml for the rationale on os/cpu/cc scoping.
          key: nimbledeps-root-linux-amd64-gcc-${{ hashFiles('.pinned') }}

      - name: Install deps
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        run: |
          nimble install_pinned

      - name: Run runnableExamples check
        run: |
          nim c -r ./tools/check_code_examples.nim
