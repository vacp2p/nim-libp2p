name: Daily without feature flags

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests-no-flags:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-daily-ci')
    timeout-minutes: 55
    env:
      NIMBLE_COMMIT: 08be587ad79f1692d5adcb03ce0a13dfda5d8818 # v0.24.0
    strategy:
      fail-fast: false

    defaults:
      run:
        shell: bash

    name: "Build and run"
    runs-on: macos-15 # using macos-15 as it is fastests to compile and run
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: macos-15
          cpu: arm64
          nim_ref: v2.2.10

      - name: Restore deps from cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: |
            nimbledeps
            tests/nimbledeps
          # Keep this in sync with ci.yml's cache key so entries are
          # reusable. See ci.yml for the rationale on os/cpu/cc scoping.
          key: nimbledeps-macos-15-arm64-clang-v2.2.10-minver-${{ hashFiles('libp2p.nimble', 'tests/tests.nimble') }}

      - name: Install deps
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        run: |
          nimble --noLockfile --requires:"nim == 2.2.10" --resolver:minver -l install -dy
          cd tests && nimble --noLockfile --requires:"nim == 2.2.10" --resolver:minver -l install -dy

      - name: Build prerequisites
        run: make nimble.paths tests/nimble.paths
        
      - name: Build without feature flags
        run: |
          nim c --mm:refc --cc:clang ./tests/test_all

      - name: Run tests
        run: |
          ./tests/test_all
