name: Documentation Generation And Publishing

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 20

    name: 'Generate & upload documentation'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      NIMBLE_COMMIT: 08be587ad79f1692d5adcb03ce0a13dfda5d8818 # v0.24.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          os: linux
          cpu: amd64
          shell: bash
          nim_ref: v2.2.10

      - name: Generate doc
        run: |
          nim --version
          nimble --version
          NIM_VERSION=$(nim --version | sed -n 's/^Nim Compiler Version \([^ ]*\).*/\1/p')
          nimble --noLockfile --requires:"nim == $NIM_VERSION" --resolver:minver -l install -dy
          nimble --noLockfile --requires:"nim == $NIM_VERSION" --resolver:minver -l setup
          # nim doc can "fail", but the doc is still generated
          nim doc --git.url:https://github.com/vacp2p/nim-libp2p --git.commit:${GITHUB_REF##*/} --outdir:${GITHUB_REF##*/} --project libp2p || true

          # check that the folder exists
          ls ${GITHUB_REF##*/}

      - name: Clone the gh-pages branch
        uses: actions/checkout@v6
        with:
          repository: vacp2p/nim-libp2p
          ref: gh-pages
          path: subdoc
          submodules: true
          fetch-depth: 0

      - name: Commit & push
        run: |
          cd subdoc

          # Update / create this branch doc
          rm -rf ${GITHUB_REF##*/}
          mv ../${GITHUB_REF##*/} .

          # Remove .idx files
          # NOTE: git also uses idx files in his
          # internal folder, hence the `*` instead of `.`
          find * -name "*.idx" -delete
          git add .
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name = "${{ github.actor }}"
          if git diff-index --quiet HEAD --; then
            echo "No documentation changes detected; skipping push."
          else
            git commit -a -m "update docs for ${GITHUB_REF##*/}"
            git push origin gh-pages
          fi

  update_site:
    name: 'Rebuild website'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Generate website
        run: pip install mkdocs-material && cd examples && nimble -y website

      - name: Clone the gh-pages branch
        uses: actions/checkout@v6
        with:
          repository: vacp2p/nim-libp2p
          ref: gh-pages
          path: subdoc
          fetch-depth: 0

      - name: Commit & push
        run: |
          cd subdoc

          # Ensure the latest changes are fetched and reset to the remote branch
          git fetch origin gh-pages
          git reset --hard origin/gh-pages

          # Preserve API reference folders generated by the `build` job
          # (for example `master/`, `vX.Y.Z/`), while fully replacing
          # the mkdocs website content at the root.
          api_doc_dirs=()
          for dir in */; do
            if [ -f "${dir}libp2p.html" ]; then
              api_doc_dirs+=("${dir%/}")
            fi
          done

          shopt -s dotglob nullglob
          for path in ./*; do
            base=${path#./}
            if [ "$base" = ".git" ]; then
              continue
            fi

            keep=false
            for dir in "${api_doc_dirs[@]}"; do
              if [ "$base" = "$dir" ]; then
                keep=true
                break
              fi
            done

            if [ "$keep" = false ]; then
              rm -rf "$path"
            fi
          done
          shopt -u dotglob nullglob

          cp -a ../site/. .

          # Maintain backward compatibility for `/docs/...` links.
          rm -rf docs
          mkdir -p docs
          cp -a ../site/. docs/

          git add .
 
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git config --global user.email "${{ github.actor }}@users.noreply.github.com"
            git config --global user.name "${{ github.actor }}"

            git commit -m "update website"
            git push origin gh-pages
          fi
