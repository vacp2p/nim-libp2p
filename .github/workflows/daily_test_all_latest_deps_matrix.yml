name: Daily test all latest dependencies matrix

on:
  workflow_call:

permissions:
  contents: read

jobs:
  delete_cache:
    name: Delete github action cache
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: write
    steps:
      - name: Delete caches for this ref
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          gh cache list -R "$REPO" --ref "$REF" --limit 100 --json id --jq '.[].id' \
            | while read -r id; do
                gh cache delete -R "$REPO" "$id" || echo "skipped $id (already gone)"
              done

  test:
    needs: [delete_cache]
    env:
      NIMBLE_COMMIT: aa8e6ea09ecac774b6fad42552569ce07bef37ec # v0.24.1
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: linux
            cpu: amd64
            cc: gcc
            builder: ubuntu-22.04
            shell: bash
          - os: linux-gcc-14
            cpu: amd64
            cc: gcc
            builder: ubuntu-24.04
            shell: bash
          - os: windows
            cpu: amd64
            cc: clang
            builder: windows-2022
            shell: bash
          - os: windows
            cpu: amd64
            cc: gcc
            builder: windows-2022
            shell: "msys2 {0}"
          - os: linux
            cpu: i386
            cc: gcc
            builder: ubuntu-22.04
            shell: bash
        nim:
          - ref: v2.2.4
            memory_management: refc
          - ref: v2.2.10
            memory_management: refc
          - ref: devel
            memory_management: refc

    defaults:
      run:
        shell: ${{ matrix.config.shell }}

    name: "${{ matrix.config.os }}-${{ matrix.config.cpu }} (Nim ${{ matrix.nim.ref }}; ${{ matrix.config.cc }}; ${{ matrix.nim.memory_management }})"
    runs-on: ${{ matrix.config.builder }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          os: ${{ matrix.config.os }}
          shell: ${{ matrix.config.shell }}
          nim_ref: ${{ matrix.nim.ref }}
          cpu: ${{ matrix.config.cpu }}

      - name: Restore llvm-mingw (Windows) from cache
        if: runner.os == 'Windows' && matrix.config.cc == 'clang'
        id: windows-mingw-cache
        uses: actions/cache@v5
        with:
          path: external/mingw-${{ matrix.config.cpu }}
          key: 'mingw-llvm-17-${{ matrix.config.cpu }}'

      - name: Install llvm-mingw dependency (Windows)
        if: >
          steps.windows-mingw-cache.outputs.cache-hit != 'true' &&
          runner.os == 'Windows' &&
          matrix.config.cc == 'clang'
        run: |
          mkdir -p external
          MINGW_BASE="https://github.com/mstorsjo/llvm-mingw/releases/download/20230905"
          MINGW_URL="$MINGW_BASE/llvm-mingw-20230905-ucrt-x86_64.zip"
          curl -L "$MINGW_URL" -o "external/mingw-${{ matrix.config.cpu }}.zip"
          7z x -y "external/mingw-${{ matrix.config.cpu }}.zip" -oexternal/mingw-${{ matrix.config.cpu }}/
          mv external/mingw-${{ matrix.config.cpu }}/**/* ./external/mingw-${{ matrix.config.cpu }}

      - name: Use gcc 14
        if: ${{ matrix.config.os == 'linux-gcc-14'}}
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 14
          sudo update-alternatives --set gcc /usr/bin/gcc-14

      - name: Path to cached dependencies (Windows)
        if: >
          runner.os == 'Windows' &&
          matrix.config.cc == 'clang'
        run: |
          echo '${{ github.workspace }}'"/external/mingw-${{ matrix.config.cpu }}/bin" >> $GITHUB_PATH
          echo "." >> $GITHUB_PATH

      - name: Install nasm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          "C:\Program Files\NASM" | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare short paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-Item -ItemType Directory -Force -Path D:\t | Out-Null
          "TEMP=D:\t" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
          "TMP=D:\t" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup dependencies (latest allowed by nimble requirements)
        run: |
          NIM_REF="${{ matrix.nim.ref }}"
          NIM_REQUIRES=()
          if [[ "$NIM_REF" == v* ]]; then
            NIM_REQUIRES=(--requires:"nim == ${NIM_REF#v}")
          fi

          echo "=== Setting up latest allowed dependencies ==="
          nimble --noLockfile --resolver:maxver -l "${NIM_REQUIRES[@]}" setup -y
          (cd tests && nimble --resolver:maxver -l "${NIM_REQUIRES[@]}" setup -y)

      - name: Build test_all
        run: |
          NIMFLAGS="--mm:${{ matrix.nim.memory_management }} --opt:speed --styleCheck:usages --styleCheck:error --parallelBuild:0 --threads:on --skipUserCfg"
          NIMFLAGS="$NIMFLAGS -d:chronicles_log_level=DEBUG"
          NIMFLAGS="$NIMFLAGS --debugger:native --stacktrace:off --define:nimStackTraceOverride"
          if [[ '${{ matrix.config.cc }}' == 'clang' ]]; then
            NIMFLAGS="$NIMFLAGS --cc:clang"
          fi
          nim c $NIMFLAGS ./tests/test_all

      - name: Run tests
        run: |
          ./tests/test_all --output-level=VERBOSE --console --xml:tests/results_test_all.xml

      - name: Run integration tests
        if: ${{ matrix.config.os == 'linux' && matrix.config.cpu == 'amd64' }}
        run: |
          export NIMFLAGS="${NIMFLAGS} -d:chronicles_log_level=DEBUG"
          make test_integration
