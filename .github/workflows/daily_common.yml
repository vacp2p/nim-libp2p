name: Daily Common
# Serves as base workflow for daily tasks, it's not run by itself.

on:
  workflow_call:
    inputs:
      pinned_deps:
        description: "Should dependencies be installed from pinned file or use latest versions"
        required: false
        type: boolean
        default: false
      nim:
        description: "Nim Configuration"
        required: true
        type: string # Following this format: [{"ref": ..., "memory_management": ...}, ...]
      configuration:
        description: "Platform/compiler matrix"
        required: true
        type: string # Following this format: [{"os": ..., "cpu": ..., "cc": ..., "builder": ..., "shell": ...}, ...]

jobs:
  delete_cache:
    name: Delete github action's branch cache
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: snnaplab/delete-branch-cache-action@v1

  test:
    needs: delete_cache
    env:
      NIMBLE_COMMIT: 9207e8b2bbdf66b5a4d1020214cff44d2d30df92 # v0.20.1
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(inputs.configuration) }}
        nim: ${{ fromJSON(inputs.nim) }}

    defaults:
      run:
        shell: ${{ matrix.config.shell }}

    name: "${{ matrix.config.os }} (nim ${{ matrix.nim.ref }} / ${{ matrix.config.cc }})"
    runs-on: ${{ matrix.config.builder }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          os: ${{ matrix.config.os }}
          shell: ${{ matrix.config.shell }}
          nim_ref: ${{ matrix.nim.ref }}
          cpu: ${{ matrix.config.cpu }}

      - name: Restore llvm-mingw (Windows) from cache
        if: runner.os == 'Windows' && matrix.config.cc == 'clang'
        id: windows-mingw-cache
        uses: actions/cache@v4
        with:
          path: external/mingw-${{ matrix.config.cpu }}
          key: 'mingw-llvm-17-${{ matrix.config.cpu }}'

      - name: Install llvm-mingw dependency (Windows)
        if: >
          steps.windows-mingw-cache.outputs.cache-hit != 'true' &&
          runner.os == 'Windows' &&
          matrix.config.cc == 'clang'
        run: |
          mkdir -p external
          MINGW_BASE="https://github.com/mstorsjo/llvm-mingw/releases/download/20230905"
          MINGW_URL="$MINGW_BASE/llvm-mingw-20230905-ucrt-x86_64.zip"
          curl -L "$MINGW_URL" -o "external/mingw-${{ matrix.config.cpu }}.zip"
          7z x -y "external/mingw-${{ matrix.config.cpu }}.zip" -oexternal/mingw-${{ matrix.config.cpu }}/
          mv external/mingw-${{ matrix.config.cpu }}/**/* ./external/mingw-${{ matrix.config.cpu }}

      - name: Use gcc 14
        if: ${{ matrix.config.os == 'linux-gcc-14'}}
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 14
          sudo update-alternatives --set gcc /usr/bin/gcc-14

      - name: Path to cached dependencies (Windows)
        if: >
          runner.os == 'Windows' &&
          matrix.config.cc == 'clang'
        run: |
          echo '${{ github.workspace }}'"/external/mingw-${{ matrix.config.cpu }}/bin" >> $GITHUB_PATH
          echo "." >> $GITHUB_PATH

      - name: Install nasm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          "C:\Program Files\NASM" | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies (pinned)
        if: ${{ inputs.pinned_deps }}
        run: |
          nimble install_pinned

      - name: Install dependencies (latest)
        if: ${{ inputs.pinned_deps == false }}
        run: |
          nimble install -y --depsOnly

      - name: Run tests
        run: |
          nim --version
          nimble --version
          if [[ '${{ matrix.config.cc }}' == 'clang' ]]; then
            clang --version
          else
            gcc --version
          fi

          export NIMFLAGS="${NIMFLAGS} --mm:${{ matrix.nim.memory_management }}"
          if [[ '${{ matrix.config.cc }}' == 'clang' ]]; then
            export NIMFLAGS="${NIMFLAGS} --cc:clang"
          fi
          nimble test -- -d:chronicles_log_level=DEBUG

      - name: Run integration tests
        if: ${{ matrix.config.os == 'linux' && matrix.config.cpu == 'amd64' }}
        run: |
          nim --version
          nimble --version
          nim r -d:libp2p_autotls_support -d:chronicles_log_level=DEBUG tests/integration/test_all.nim
