name: Daily i386

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test_i386_latest:
    name: Daily i386 (latest dependencies)
    uses: ./.github/workflows/daily_common.yml
    with:
      nim: "[
          {'ref': 'v2.0.16', 'memory_management': 'refc'},
          {'ref': 'v2.2.6', 'memory_management': 'refc'},
          {'ref': 'devel', 'memory_management': 'refc'},
        ]"
      configuration: "[
          {'os': 'linux', 'cpu': 'i386', 'cc': 'gcc', 'builder': 'ubuntu-22.04', 'shell': 'bash'},
        ]"
  test_i386_pinned:
    name: Daily i386 (pinned dependencies)
    uses: ./.github/workflows/daily_common.yml
    with:
      pinned_deps: true
      nim: "[
          {'ref': 'v2.0.16', 'memory_management': 'refc'},
          {'ref': 'v2.2.6', 'memory_management': 'refc'},
          {'ref': 'devel', 'memory_management': 'refc'},
        ]"
      configuration: "[
          {'os': 'linux', 'cpu': 'i386', 'cc': 'gcc', 'builder': 'ubuntu-22.04', 'shell': 'bash'},
        ]"
  notify-on-failure:
    name: Notify Discord on Failure
    needs: [test_i386_latest, test_i386_pinned]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Discord notification
        uses: ./.github/actions/discord_notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
