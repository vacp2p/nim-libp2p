name: temp i386

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    env:
      NIMBLE_COMMIT: 42ef70c2102a942c46f13eb76872326edd525cec # v0.22.3
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        nim:
          - ref: v2.2.10
            memory_management: orc

    defaults:
      run:
        shell: bash

    name: "linux-i386 orc+asan test_gossipsub_message_handling"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Select Nimble version
        if: matrix.nim.nimble_commit != ''
        shell: bash
        run: echo "NIMBLE_COMMIT=${{ matrix.nim.nimble_commit }}" >> $GITHUB_ENV

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          os: linux
          cpu: i386
          shell: bash
          nim_ref: ${{ matrix.nim.ref }}

      - name: Restore deps from cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: nimbledeps
          key: nimbledeps-linux-i386-gcc-${{ hashFiles('.pinned') }}

      - name: Install deps
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        run: |
          nimble install_pinned

      - name: Run tests
        id: run-tests
        run: |
          nim --version
          nimble --version
          gcc --version

          export NIMFLAGS="${NIMFLAGS} --mm:${{ matrix.nim.memory_management }}"

          if [[ '${{ matrix.nim.memory_management }}' == 'orc' ]]; then
            export NIMFLAGS="${NIMFLAGS} -d:useMalloc --passC:-fsanitize=address --passL:-fsanitize=address"
          fi

          # Build/run test binaries with fewer lanes on 32-bit to stay under
          # the ~3 GB address cap.
          make TEST_JOBS=2 TEST_PATH=libp2p/pubsub/component/test_gossipsub_message_handling test