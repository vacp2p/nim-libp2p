name: Examples

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  examples:
    env:
      NIMBLE_COMMIT: 08be587ad79f1692d5adcb03ce0a13dfda5d8818 # v0.24.0
    timeout-minutes: 30
    strategy:
      fail-fast: false

    defaults:
      run:
        shell: bash

    name: "Build Examples"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: linux
          cpu: amd64
          nim_ref: v2.2.10

      - name: Restore deps from cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: nimbledeps
          # Keep this in sync with ci.yml's cache key so entries are
          # reusable. See ci.yml for the rationale on os/cpu/cc scoping.
          key: nimbledeps-linux-amd64-gcc-v2.2.10-minver-${{ hashFiles('libp2p.nimble') }}

      - name: Install deps
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        run: |
          nimble --noLockfile --requires:"nim == 2.2.10" --resolver:minver -l install -dy

      - name: Build prerequisites
        run: make nimble.paths
        
      - name: Build and run examples
        run: |
          nim --version
          nimble --version
          gcc --version

          nimble --noLockfile --requires:"nim == 2.2.10" --resolver:minver -l setup
          cd examples && nimble examples
