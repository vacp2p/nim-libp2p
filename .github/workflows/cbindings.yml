name: C bindings

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  c-bindings:
    timeout-minutes: 30
    strategy:
      fail-fast: false
    env:
      NIMBLE_COMMIT: aa8e6ea09ecac774b6fad42552569ce07bef37ec # v0.24.1

    defaults:
      run:
        shell: bash

    name: "Build C bindings"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: linux
          cpu: amd64
          nim_ref: v2.2.10

      - name: Restore dependencies from cache
        uses: "./.github/actions/install_cbind_deps"
        with:
          os: linux
          cpu: amd64
          cc: gcc
          nim_ref: v2.2.10

      - name: Build FFI library and generate C/CDDL bindings
        run: |
          nim --version
          nimble --version
          gcc --version

          nimble --lockFile:nix/libp2p.lock -l setup -y
          cd cbind
          nimble -l setup -y
          nimble buildffi
          nimble genbindings_c
          nimble genbindings_cddl

      - name: Build and run C bindings examples
        run: |
          cd cbind
          nimble examples

  # macOS coverage for the FFI library build + C/CDDL binding generation; the
  # main c-bindings job above covers linux.
  c-bindings-ffi:
    timeout-minutes: 30
    strategy:
      fail-fast: false
    env:
      NIMBLE_COMMIT: aa8e6ea09ecac774b6fad42552569ce07bef37ec # v0.24.1

    defaults:
      run:
        shell: bash

    name: "Build FFI library (nim-ffi)"
    runs-on: macos-15 # fastest to compile and run; see daily_test_all_no_flags.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: macos-15
          cpu: arm64
          nim_ref: v2.2.10

      - name: Restore dependencies from cache
        uses: "./.github/actions/install_cbind_deps"
        with:
          os: macos-15
          cpu: arm64
          cc: clang
          nim_ref: v2.2.10

      - name: Build FFI library and generate C/CDDL bindings
        run: |
          nim --version
          nimble --version
          clang --version

          nimble --lockFile:nix/libp2p.lock -l setup -y
          cd cbind
          nimble -l setup -y
          nimble buildffi
          nimble genbindings_c
          nimble genbindings_cddl
