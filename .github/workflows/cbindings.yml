name: C bindings

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  c-bindings:
    timeout-minutes: 30
    strategy:
      fail-fast: false
    env:
      NIMBLE_COMMIT: 08be587ad79f1692d5adcb03ce0a13dfda5d8818 # v0.24.0

    defaults:
      run:
        shell: bash

    name: "Build C bindings"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: linux
          cpu: amd64
          nim_ref: v2.2.10

      - name: Restore deps from cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: |
            nimbledeps
            cbind/nimbledeps
          # cbind is app-like: cache the lockfile dependency universe separately
          # from library min-version CI.
          key: nimbledeps-linux-amd64-gcc-v2.2.10-lockfile-${{ hashFiles('nimble.lock', 'cbind/nimble.lock') }}

      - name: Install deps
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        run: |
          nimble -l install -dy
          cd cbind && nimble -l install -dy

      - name: Build FFI library and generate C/CDDL bindings
        run: |
          nim --version
          nimble --version
          gcc --version

          nimble -l setup
          cd cbind
          nimble -l setup
          nimble -l buildffi
          nimble -l genbindings_c
          nimble -l genbindings_cddl

      - name: Build and run C bindings examples
        run: |
          cd cbind
          nimble -l examples

  # macOS coverage for the FFI library build + C/CDDL binding generation; the
  # main c-bindings job above covers linux.
  c-bindings-ffi:
    timeout-minutes: 30
    strategy:
      fail-fast: false
    env:
      NIMBLE_COMMIT: 08be587ad79f1692d5adcb03ce0a13dfda5d8818 # v0.24.0

    defaults:
      run:
        shell: bash

    name: "Build FFI library (nim-ffi)"
    runs-on: macos-15 # fastest to compile and run; see daily_test_all_no_flags.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nim
        uses: "./.github/actions/install_nim"
        with:
          shell: bash
          os: macos-15
          cpu: arm64
          nim_ref: v2.2.10

      - name: Restore deps from cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: |
            nimbledeps
            cbind/nimbledeps
          key: nimbledeps-macos-15-arm64-clang-v2.2.10-lockfile-${{ hashFiles('nimble.lock', 'cbind/nimble.lock') }}

      - name: Install deps
        if: ${{ steps.deps-cache.outputs.cache-hit != 'true' }}
        run: |
          nimble -l install -dy
          cd cbind && nimble -l install -dy

      - name: Build FFI library and generate C/CDDL bindings
        run: |
          nim --version
          nimble --version
          clang --version

          nimble -l setup
          cd cbind
          nimble -l setup
          nimble -l buildffi
          nimble -l genbindings_c
          nimble -l genbindings_cddl
