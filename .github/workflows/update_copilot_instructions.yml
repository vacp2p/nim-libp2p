name: Weekly Copilot Instructions Update

on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 3AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  update-copilot-instructions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: pip install openai PyGithub  # openai SDK works for Claude via the GitHub Models OpenAI-compatible endpoint

      - name: Fetch merged PRs and generate instructions update
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_MODEL_TOKEN: ${{ secrets.AI_MODEL_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import pathlib
          from datetime import datetime, timedelta, timezone
          from github import Github
          from openai import OpenAI

          # ── tuneable limits ──────────────────────────────────────────────────
          MAX_PR_BODY_CHARS      = 2000   # per-PR description truncation
          MAX_PATCH_CHARS        = 3000   # per-file patch truncation
          MAX_PR_PAYLOAD_CHARS   = 25000  # total PR payload sent to the model
          MAX_REPO_PAYLOAD_CHARS = 25000  # total repo-state payload sent to the model
          MAX_REPO_FILE_CHARS    = 5000   # per-file snippet from the repo
          MAX_INSTRUCTIONS_CHARS = 50000  # characters of current instructions included (full file)
          # ─────────────────────────────────────────────────────────────────────

          github_token = os.environ["GITHUB_TOKEN"]
          ai_model_token = os.environ["AI_MODEL_TOKEN"]
          repo_name = os.environ["REPO"]

          gh = Github(github_token)
          repo = gh.get_repo(repo_name)

          # Read current copilot-instructions.md
          with open(".github/copilot-instructions.md", "r") as f:
              current_instructions = f.read()

          # ── 1. Collect a representative snapshot of the current repository ──
          # Priority-ordered list of files whose content best reflects the
          # project's current coding conventions.
          REPO_SNAPSHOT_FILES = [
              "config.nims",
              "libp2p/errors.nim",
              "libp2p/switch.nim",
              "libp2p/builders.nim",
              "libp2p/peerid.nim",
              "libp2p/multiaddress.nim",
              "libp2p/stream/connection.nim",
              "libp2p/protocols/pubsub/gossipsub.nim",
              "libp2p/muxers/yamux/yamux.nim",
              "libp2p/transports/tcptransport.nim",
              "libp2p/crypto/crypto.nim",
              "tests/libp2p/test_switch.nim",
          ]

          repo_snippets = {}
          total_repo_chars = 0
          for rel_path in REPO_SNAPSHOT_FILES:
              full_path = pathlib.Path(rel_path)
              if not full_path.exists():
                  continue
              try:
                  text = full_path.read_text(encoding="utf-8", errors="replace")
                  snippet = text[:MAX_REPO_FILE_CHARS]
                  if total_repo_chars + len(snippet) > MAX_REPO_PAYLOAD_CHARS:
                      remaining = MAX_REPO_PAYLOAD_CHARS - total_repo_chars
                      if remaining <= 0:
                          break
                      snippet = snippet[:remaining]
                  repo_snippets[rel_path] = snippet
                  total_repo_chars += len(snippet)
              except OSError:
                  continue

          repo_state_section = "\n\n".join(
              f"### {path}\n```nim\n{content}\n```"
              for path, content in repo_snippets.items()
          )
          print(
              f"Collected {len(repo_snippets)} repo file(s) "
              f"({total_repo_chars} chars) for analysis."
          )

          # ── 2. Fetch merged PRs from the last 7 days ──────────────────────
          one_week_ago = datetime.now(timezone.utc) - timedelta(days=7)
          merged_prs = []

          pulls = repo.get_pulls(state="closed", sort="updated", direction="desc")
          for pr in pulls:
              if pr.updated_at < one_week_ago:
                  # All subsequent PRs were updated even earlier; stop scanning.
                  break
              if pr.merged_at is None or pr.merged_at < one_week_ago:
                  continue
              pr_info = {
                  "number": pr.number,
                  "title": pr.title,
                  "body": (pr.body or "")[:MAX_PR_BODY_CHARS],
                  "merged_at": pr.merged_at.isoformat(),
                  "files": [],
              }
              for f in pr.get_files():
                  if f.patch:
                      pr_info["files"].append(
                          {"filename": f.filename, "patch": f.patch[:MAX_PATCH_CHARS]}
                      )
              merged_prs.append(pr_info)

          print(f"Found {len(merged_prs)} merged PR(s) in the last week.")

          # Truncate the PR payload at a PR boundary so the JSON remains valid.
          included_prs = []
          total_pr_chars = 0
          for pr_info in merged_prs:
              serialized = json.dumps(pr_info, indent=2)
              if total_pr_chars + len(serialized) > MAX_PR_PAYLOAD_CHARS:
                  print(
                      f"PR payload limit reached; including {len(included_prs)} of "
                      f"{len(merged_prs)} PRs."
                  )
                  break
              included_prs.append(pr_info)
              total_pr_chars += len(serialized)

          prs_summary = json.dumps(included_prs, indent=2)

          # ── 3. Build the prompt combining both evidence sources ────────────
          pr_section = (
              prs_summary
              if included_prs
              else "(no pull requests were merged in the last 7 days)"
          )

          prompt = f"""
          You are a technical documentation expert maintaining a Nim/libp2p GitHub repository's
          Copilot coding-agent instructions file. Your job is to update
          `copilot-instructions.md` based on two sources of evidence:

          1. **Current repository source code** — reflects the actual conventions in use today.
          2. **Merged pull requests from the last 7 days** — reflects recent intentional changes.

          ## Current copilot-instructions.md
          {current_instructions[:MAX_INSTRUCTIONS_CHARS]}

          ## Current repository source code (representative snippets)
          {repo_state_section}

          ## Merged pull requests from the last 7 days
          {pr_section}

          ## Your task
          1. Read the current instructions carefully and understand which conventions are already documented.
          2. Examine the repository source snippets for coding patterns, idioms, or conventions that
             are consistently used but NOT yet documented in the instructions.
          3. Examine merged PRs for patterns introduced or reinforced this week that are NOT yet documented.
          4. Add only genuinely new, non-redundant rules/guidelines to the appropriate section(s) of the
             document. If no new patterns are found, return the original document unchanged.
          5. If existing documented rules are contradicted or outdated based on the current code,
             update them to reflect the current reality.
          6. Preserve the existing document structure, formatting, and tone exactly.
          7. Return ONLY the complete updated copilot-instructions.md content — no preamble,
             no explanation, no markdown fences around the whole document.
          """.strip()

          ai_client = OpenAI(
              base_url="https://models.inference.ai.azure.com",
              api_key=ai_model_token,
          )

          # Use Claude 3.7 Sonnet via the GitHub Models OpenAI-compatible endpoint.
          # Claude offers better instruction-following for technical documentation tasks
          # and a 200K-token context window (vs 128K for gpt-4o), allowing the full
          # instructions file and richer code snippets to fit in a single call.
          # temperature=0.1 for deterministic, conservative output — we want
          # the model to stay close to established conventions and avoid
          # hallucinating patterns not present in the evidence.
          response = ai_client.chat.completions.create(
              model="claude-3-7-sonnet",
              messages=[
                  {
                      "role": "system",
                      "content": (
                          "You are a helpful assistant that maintains coding-guidelines "
                          "documentation for software projects. You are precise, concise, "
                          "and only add content that is clearly supported by the evidence "
                          "in the provided source code and pull requests."
                      ),
                  },
                  {"role": "user", "content": prompt},
              ],
              max_tokens=8192,
              temperature=0.1,
          )

          updated = response.choices[0].message.content.strip()

          # Strip accidental outer markdown fences
          if updated.startswith("```markdown"):
              updated = updated[len("```markdown"):].lstrip("\n")
          elif updated.startswith("```"):
              updated = updated[3:].lstrip("\n")
          if updated.endswith("```"):
              updated = updated[:-3].rstrip("\n")
          updated = updated.strip()

          if updated == current_instructions.strip():
              print("No new patterns identified. Skipping PR creation.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("has_changes=false\n")
          else:
              with open(".github/copilot-instructions.md", "w") as f:
                  f.write(updated + "\n")
              print("copilot-instructions.md updated with new patterns.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("has_changes=true\n")
          PYEOF

      - name: Create branch and open PR
        if: steps.generate.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="chore/copilot-instructions-update-${DATE}"
          PR_BODY=$(cat <<'EOF'
          ## Weekly Copilot Instructions Update
          
          This PR was automatically generated by the weekly update workflow.
          It updates `.github/copilot-instructions.md` based on:
          - Analysis of **current repository source code** (representative file snapshots)
          - Patterns observed in **pull requests merged during the last 7 days**
          
          ### What to review
          - Check that the suggested additions are accurate and appropriate.
          - Remove or refine any suggestions that don't match project conventions.
          - Merge when the content looks good.
          EOF
          )

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git checkout -b "$BRANCH"
          git add .github/copilot-instructions.md
          git commit -m "chore: weekly update of copilot-instructions.md [skip ci]"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: weekly update of copilot-instructions.md ($(date +%Y-%m-%d))" \
            --body "$PR_BODY" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH")

          echo "Created PR: $PR_URL"

          # Attempt to assign the GitHub Copilot coding agent to the PR.
          # This requires the Copilot coding agent feature to be enabled for
          # the repository; the step does not fail if it is not available.
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr edit "$PR_NUMBER" --add-assignee "copilot" \
            || echo "Note: could not assign @copilot directly (feature may not be enabled)"
